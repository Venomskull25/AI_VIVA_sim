<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Viva Practice</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🤖 AI Viva Practice</h1>

        <!-- Topic Input -->
        <input 
            type="text" 
            id="topic" 
            placeholder="Enter topic (e.g., DBMS, OS, AI)"
        >

        <button onclick="getQuestion()">Start Viva</button>

        <!-- Question -->
        <h3 id="question"></h3>

        <!-- Answer -->
        <textarea 
            id="answer" 
            placeholder="Type your answer here..."
        ></textarea>

        <button onclick="submitAnswer()">Submit Answer</button>

        <!-- Result -->
        <pre id="result"></pre>
    </div>

    <!-- JS (IMPORTANT: at bottom) -->
    <script src="script.js"></script>

</body>
</html>
